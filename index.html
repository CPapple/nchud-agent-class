<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中興大學 Hermes Agent 實作課程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: #F5F0EB;
            color: #1A1A2E;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 48px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(200,107,78,0.2);
        }
        .badge {
            display: inline-block;
            background: #C86B4E;
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1A1A2E;
        }
        .subtitle {
            color: #C86B4E;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .link-btn {
            display: inline-block;
            background: #C86B4E;
            color: white;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(200,107,78,0.4);
            min-width: 260px;
        }
        .link-btn:hover {
            background: #A85A3F;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(200,107,78,0.5);
        }
        .link-btn:active {
            transform: translateY(0);
        }
        .link-btn.secondary {
            background: #4A7C6F;
            box-shadow: 0 4px 15px rgba(74,124,111,0.4);
        }
        .link-btn.secondary:hover {
            background: #3B6659;
            box-shadow: 0 8px 25px rgba(74,124,111,0.5);
        }
        .link-btn.tertiary {
            background: #132642;
            box-shadow: 0 4px 15px rgba(19,38,66,0.4);
        }
        .link-btn.tertiary:hover {
            background: #203a5f;
            box-shadow: 0 8px 25px rgba(19,38,66,0.5);
        }
        .link-label {
            font-size: 13px;
            color: rgba(26,26,46,0.5);
            margin-bottom: 4px;
        }
        .arrow { margin-left: 8px; }
        .footer {
            margin-top: 32px;
            font-size: 13px;
            color: rgba(26,26,46,0.35);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">HERMES AGENT</div>
        <h1>中興大學 Agent 實作課程</h1>
        <p class="subtitle">2026/07/16（四）13:30 – 16:30</p>
        <div class="links">
            <div>
                <p class="link-label">上午場</p>
                <a class="link-btn secondary" href="https://drive.google.com/file/d/1JlwMf4fthWj_GzrEwCSp8gf7Gg9APQFe/view?usp=sharing" target="_blank">
                    上午簡報 PPT <span class="arrow">&rarr;</span>
                </a>
            </div>
            <div>
                <p class="link-label">下午場</p>
                <a class="link-btn" href="https://docs.google.com/presentation/d/1yNOPZYGrVLCLSelnRuxM9i1ZyZ0_wD1m/edit?usp=sharing" target="_blank">
                    下午簡報 PPT <span class="arrow">&rarr;</span>
                </a>
            </div>
            <div>
                <p class="link-label">下午場延伸教材</p>
                <a class="link-btn tertiary" href="extension.html" target="_blank">
                    延伸教材網頁 <span class="arrow">&rarr;</span>
                </a>
            </div>
        </div>
        <p class="footer">點擊按鈕即可開啟對應簡報或教材</p>
    </div>
</body>
</html>
